services:
  frontend:
    build: ./frontend/
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TZ: "America/Sao_Paulo"
      RUNCODES_DOMAIN: "http://localhost:8080"
      VITE_API_ENDPOINT: "http://localhost:8443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - runcodes-network

  backend:
    build: ./backend/
    restart: unless-stopped
    ports:
      - "8443:8443"
    networks:
      - runcodes-network
    environment:
      TZ: "America/Sao_Paulo"
      RUNCODES_JWT_SECRET: "${RUNCODES_JWT_SECRET:?RUNCODES_JWT_SECRET must be set}"
      RUNCODES_API_PORT: "8443"
      RUNCODES_DB_HOST: "database"
      RUNCODES_DB_PORT: "5432"
      RUNCODES_DB_USER: "runcodes"
      RUNCODES_DB_PASSWORD: "${RUNCODES_DB_PASSWORD:?RUNCODES_DB_PASSWORD must be set}"
      RUNCODES_DB_NAME: "runcodes"

  # PostgreSQL Database
  database:
    build: ./database/
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      TZ: "America/Sao_Paulo"
      POSTGRES_PASSWORD: "${RUNCODES_DB_PASSWORD:?RUNCODES_DB_PASSWORD must be set}"
    volumes:
      - runcodes-db-vol:/var/lib/postgresql/data
    networks:
      - runcodes-network

  # Compiler Engine
  rcc:
    image: ghcr.io/runcodes-icmc/compiler-engine:latest
    restart: unless-stopped
    environment:
      TZ: "America/Sao_Paulo"
      RUNCODES_COMPILER_EXEC_DIR: /exec
      RUNCODES_COMPILER_EXEC_DIR_REMOTE: ${PWD}/exec
      DOCKER_HOST: tcp://docker-dind:2375
    volumes:
      - ./exec:/exec
    networks:
      - runcodes-network
      - dind-network
    depends_on:
      - docker-dind

  # Docker-in-Docker for isolated container operations
  docker-dind:
    image: docker:dind
    restart: unless-stopped
    privileged: true
    environment:
      TZ: "America/Sao_Paulo"
      DOCKER_TLS_CERTDIR: "" # Disable TLS for simplicity in internal network
    networks:
      - dind-network
    volumes:
      - docker-dind-vol:/var/lib/docker

  # Local SMTP server for intercepting e-mails
  smtp4dev:
    image: rnwood/smtp4dev:v3.15
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      TZ: "America/Sao_Paulo"
    networks:
      - runcodes-network

  # Redis for cache & session management
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    environment:
      TZ: "America/Sao_Paulo"
    volumes:
      - runcodes-redis-vol:/data
    networks:
      - runcodes-network

  ###########
  # Seaweed #
  ###########

  seaweed:
    image: chrislusf/seaweedfs:4.19
    ports:
      - 8333:8333
    environment:
      TZ: "America/Sao_Paulo"
    command: server -s3 -volume.max=50 -dir="/data" -master.volumeSizeLimitMB=256 -ip=seaweed -ip.bind=0.0.0.0
    volumes:
      - runcodes-seaweed-vol:/data
    networks:
      - runcodes-network

networks:
  runcodes-network:
    driver: bridge
  dind-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  runcodes-db-vol:
  runcodes-redis-vol:
  runcodes-seaweed-vol:
  docker-dind-vol:
